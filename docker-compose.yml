services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-demokrati}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-demokrati}
      TZ: Europe/Ljubljana
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-demokrati}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Europe/Ljubljana
      DATABASE_URI: postgres://${POSTGRES_USER:-demokrati}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-demokrati}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?nastavi PAYLOAD_SECRET v .env}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://demokratiradovljica.com}
      # Google Search Console potrditev (HTML meta metoda) – neobvezno
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      # E-pošta (SMTP)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_NOTIFY_EMAIL: ${ADMIN_NOTIFY_EMAIL:-}
      # Reply-To na vseh odhodnih e-poštah (privzeto = ADMIN_NOTIFY_EMAIL)
      REPLY_TO_EMAIL: ${REPLY_TO_EMAIL:-}
      # AI modul (Anthropic / Claude)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-8}
    volumes:
      - media_data:/app/media
    # Vrat ni treba odpirati navzven – do aplikacije pride Cloudflare Tunnel po notranji mreži.
    # Če bi želel lokalni dostop brez tunela, odkomentiraj:
    # ports:
    #   - '${APP_PORT:-3000}:3000'

  # Enkraten korak: ustvari shemo v PostgreSQL + vpiše privzete podatke.
  # Zaženeš ročno ob prvem deployu (in po dodajanju novih zbirk):
  #   docker compose run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    environment:
      # development → Payload samodejno uskladi shemo (push) v Postgres
      NODE_ENV: development
      DATABASE_URI: postgres://${POSTGRES_USER:-demokrati}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-demokrati}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?nastavi PAYLOAD_SECRET v .env}
    depends_on:
      db:
        condition: service_healthy
    profiles: ['tools']
    # "yes |" samodejno potrdi morebitno opozorilo pri uskladitvi sheme (neinteraktivno).
    # Varovalo v onInit poskrbi, da administrator nikoli ne ostane brez vloge.
    command: ['sh', '-c', 'yes | npx payload run scripts/push-schema.ts']

  # Samodejne dnevne varnostne kopije baze (shranjene v ./backups na strežniku).
  # Obdrži zadnjih 14 dni; gzip stisnjen pg_dump z DROP-i za čisto obnovitev.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-demokrati}
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATABASE: ${POSTGRES_DB:-demokrati}
      TZ: Europe/Ljubljana
    volumes:
      - ./backups:/backups
    command: >
      sh -c 'while true; do
        f="/backups/demokrati-$$(date +%Y-%m-%d_%H-%M).sql.gz";
        if pg_dump --clean --if-exists | gzip > "$$f"; then echo "Backup OK: $$f"; else echo "Backup NEUSPEH"; rm -f "$$f"; fi;
        find /backups -name "demokrati-*.sql.gz" -mtime +14 -delete;
        sleep 86400;
      done'

  # Cloudflare Tunnel – varno objavi stran brez javnega IP-ja in odprtih vrat.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?nastavi TUNNEL_TOKEN v .env}
    depends_on:
      - app

volumes:
  db_data:
  media_data:
